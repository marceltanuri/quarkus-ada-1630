# Datasource configuration
quarkus.datasource.db-kind=mysql
quarkus.datasource.username=root
quarkus.datasource.password=root
quarkus.datasource.jdbc.url=jdbc:mysql://localhost:3306/reclameaqui

# Hibernate configuration
quarkus.hibernate-orm.database.generation=none

# Flyway configuration
quarkus.flyway.migrate-at-start=true

quarkus.http.port=8080

# Configuration for the Title Generator API
title-generator-api/mp-rest/url=https://baconipsum.com/api/

quarkus.log.category."org.jboss.resteasy.reactive.client".level=DEBUG

quarkus.http.auth.basic=true
quarkus.security.users.embedded.enabled=true
quarkus.security.users.embedded.plain-text=true
quarkus.security.users.embedded.users.admin=admin123
quarkus.security.users.embedded.roles.admin=ADMIN

quarkus.security.users.embedded.users.user=user123
quarkus.security.users.embedded.roles.user=USER

quarkus.http.auth.policy.restricted-access.roles-allowed=ADMIN,USER
quarkus.http.auth.permission.reclamacoes.paths=/reclamacoes/*
quarkus.http.auth.permission.reclamacoes.policy=restricted-access

# multi factor authentication -> token de acesso (tempo de vida) 15 minutos media
# OAuth - protocolo de autorização baseado em token

# APIs protegidas por token de acesso. 
# Quem gera o token é um sistema especifico de autenticação. Identity Provider
# Azure, Google, Amazon -> serviço de integração para autenticação
# Token de acesso: OAuth2.0
# Delegação, Federação de autenticação: SSO Single Sign On

